name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Install, lint, typecheck, test, and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_rwa_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_rwa_ci?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint all workspaces
        run: npm run lint

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Validate Prisma migrations
        run: |
          npm run db:migrate:deploy --workspace=api
          npm run db:migrate:status --workspace=api

      - name: Test backend
        run: npm run test:backend

      - name: Build shared, web, and api
        run: npm run build

      - name: Validate OpenAPI spec
        run: npm run validate:openapi
